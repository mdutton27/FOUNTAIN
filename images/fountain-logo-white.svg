<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Fountain icon - stylized water droplets rising (white version for dark backgrounds) -->
  <g transform="translate(10, 5)">
    <!-- Central rising stream -->
    <ellipse cx="20" cy="45" rx="8" ry="4" fill="#ffffff" opacity="0.3"/>
    <path d="M20 42 Q20 25 20 15 Q20 8 20 5" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Left arc -->
    <path d="M20 20 Q12 12 8 18 Q4 25 10 35" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Right arc -->
    <path d="M20 20 Q28 12 32 18 Q36 25 30 35" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Top droplet -->
    <circle cx="20" cy="4" r="3" fill="#e07b39"/>
    <!-- Side droplets -->
    <circle cx="8" cy="16" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="32" cy="16" r="2" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="55" y="40" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="600" fill="#ffffff">Fountain</text>
</svg>
